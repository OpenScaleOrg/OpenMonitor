name: Feature Request
description: File a feature request
body:
  - type: checkboxes
    attributes: 
      label: Prerequisites
      options:
        - label: I have searched for related issues in the [issues](https://github.com/OpenScaleOrg/OpenMonitor/issues) list.
          required: true
        - label: I have read the [wiki](https://github.com/OpenScaleOrg/OpenMonitor/wiki/Home_en) page and make sure that the current version of OpenMonitor does not provide this feature.
          required: true
  - type: input
    attributes:
      label: Current OpenMonitor Version
      description: "Right-click the OpenMonitor tray icon, select `Help` → `About`."
    validations: 
      required: true
  - type: textarea
    attributes:   
      label: Describe the feature
      description: "For ease of management, please do not report multiple unrelated issues under the same issue."
    validations:
      required: true
  - type: textarea
    attributes:
      label: Additional Information
      description: "If you have other information to note, you can fill it in here."
