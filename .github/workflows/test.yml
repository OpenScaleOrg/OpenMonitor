name: Tests

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  unit-tests:
    name: Unit Tests (x64)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install Google Test via NuGet
        shell: pwsh
        run: |
          if (-not (Test-Path packages)) { New-Item -ItemType Directory packages | Out-Null }
          nuget install Microsoft.googletest.v140.windesktop.msvcstl.dyn.rt-dyn `
            -Version 1.8.1.7 -OutputDirectory packages

      - name: Build test project
        shell: pwsh
        run: |
          msbuild tests\OpenMonitorTests\OpenMonitorTests.vcxproj `
            /p:Configuration=Release /p:Platform=x64 `
            /p:platformToolset=v143 /m /v:minimal

      - name: Run tests
        shell: pwsh
        run: |
          $exe = 'tests\OpenMonitorTests\bin\x64\Release\OpenMonitorTests.exe'
          & $exe --gtest_output=xml:test_results.xml
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test_results.xml

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Google Test Results
          path: test_results.xml
          reporter: java-junit
          fail-on-error: true
