# Dependabot — automatic dependency update PRs
# https://docs.github.com/en/code-security/dependabot

version: 2

updates:

  # GitHub Actions
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: Asia/Kolkata
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: "chore(actions)"
    groups:
      actions:
        patterns:
          - "*"
